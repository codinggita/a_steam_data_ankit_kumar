services:
  - type: web
    name: steam-games-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    rootDir: Backend
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
        placeholder: "Enter MongoDB connection string"
      - key: JWT_SECRET
        sync: false
        placeholder: "Enter JWT secret key"
      - key: JWT_EXPIRE
        value: 1d
